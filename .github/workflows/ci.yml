# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: endersdelight-jar
          path: build/libs/*.jar

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

      - name: Send dev jar to Discord
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION=$(grep "^mod_version=" gradle.properties | cut -d= -f2)
          MC_VERSION=$(grep "^minecraft_version=" gradle.properties | cut -d= -f2)

          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -n 1)
          DEV_JAR="endersdelight-dev-neoforge-${MC_VERSION}-${VERSION}.jar"

          cp "$JAR_FILE" "$DEV_JAR"

          curl \
            -F "payload_json={\"content\":\"New *Ender's Delight* **dev build** available\"}" \
            -F "file=@${DEV_JAR}" \
            "$DISCORD_WEBHOOK_URL"