# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: endersdelight-jar
          path: build/libs/*.jar

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

      - name: Send jar to Discord
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -n 1)

          curl \
            -F "payload_json={\"content\":\"New **Ender's Delight** build available in **main** branch\"}" \
            -F "file=@${JAR_FILE}" \
            "$DISCORD_WEBHOOK_URL"